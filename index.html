<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0A0E17" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Flash" />
<title>Flash Tracker</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0A0E17;
    --panel: #12161F;
    --line: #1E2328;
    --cyan: #0AC8B9;
    --gold: #C8AA6E;
    --gold-dim: #785A28;
    --text: #F0E6D2;
    --muted: #5B5A56;
    --muted2: #A09B8C;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    overscroll-behavior: none;
    user-select: none;
  }
  #app {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
    padding: 40px 20px calc(24px + env(safe-area-inset-bottom));
  }
  .glow {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(circle at 50% 15%, rgba(10,200,185,0.10), transparent 60%);
  }
  h1.eyebrow {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    letter-spacing: 0.3em;
    font-size: 11px;
    text-transform: uppercase;
    margin: 0 0 4px 0;
    z-index: 1;
  }
  h2.title {
    font-family: 'Cinzel', serif;
    color: var(--text);
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 6px 0;
    letter-spacing: 0.02em;
    z-index: 1;
  }
  .subtitle {
    color: var(--muted);
    font-size: 12px;
    margin: 0 0 24px 0;
    z-index: 1;
    text-align: center;
  }
  #lanes {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 1;
  }
  .lane-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--panel);
    border-radius: 12px;
    padding: 10px 14px;
  }
  .ring-wrap {
    position: relative;
    width: 78px; height: 78px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .ring-svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .ring-progress { transition: stroke-dashoffset 0.1s linear, stroke 0.3s ease; }
  .letter-icon {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 24px; font-weight: 700;
  }
  .timer-text {
    position: absolute; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px; font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.01em;
  }
  .lane-info { flex: 1; cursor: pointer; min-width: 0; }
  .lane-name {
    font-size: 15px; font-weight: 600; color: var(--text);
    margin: 0;
  }
  .lane-status {
    font-size: 13px; color: var(--muted);
    margin: 2px 0 0 0;
    font-variant-numeric: tabular-nums;
  }
  .haste-badge {
    flex-shrink: 0;
    min-width: 42px;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Rajdhani', sans-serif;
    border: 1px solid var(--line);
    color: var(--muted2);
    background: transparent;
  }
  .haste-badge.active {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(10,200,185,0.08);
  }

  #installBar {
    position: fixed; left: 16px; right: 16px; bottom: calc(16px + env(safe-area-inset-bottom));
    background: var(--panel); border: 1px solid rgba(10,200,185,0.3);
    border-radius: 8px; padding: 12px 14px; display: none;
    align-items: center; justify-content: space-between; gap: 10px; z-index: 5;
    font-size: 13px;
  }
  #installBar.show { display: flex; }
  #installBtn {
    background: var(--cyan); color: #04211f; border: none; border-radius: 4px;
    padding: 8px 14px; font-weight: 700; font-family: 'Rajdhani', sans-serif; font-size: 13px;
  }
  #installClose { background: none; border: none; color: var(--muted2); font-size: 18px; padding: 0 4px; }
</style>
</head>
<body>
<div id="app">
  <div class="glow"></div>
  <h1 class="eyebrow">Cooldown Tracker</h1>
  <h2 class="title">Flash Tracker</h2>
  <p class="subtitle">Tap a lane to start its timer · tap the badge to set cooldown reduction</p>

  <div id="lanes"></div>
</div>

<div id="installBar">
  <span id="installText">Install this app to your home screen</span>
  <button id="installBtn">Install</button>
  <button id="installClose">✕</button>
</div>

<script>
  const BASE_COOLDOWN = 300;   // Flash base cooldown, seconds
  const TOLERANCE = -10;        // safety buffer added on top, seconds

  const HASTE_STEPS = [
    { value: 0, label: '—' },
    { value: 18, label: 'CI' },
    { value: 28, label: 'CI+B' },
  ];

  const LANES = [
    { id: 'top', name: 'Top', color: '#E2574C', letter: 'T' },
    { id: 'jgl', name: 'Jungle', color: '#6FCF6F', letter: 'J' },
    { id: 'mid', name: 'Mid', color: '#B98AE3', letter: 'M' },
    { id: 'adc', name: 'ADC', color: '#F2C94C', letter: 'A' },
    { id: 'sup', name: 'Support', color: '#56CCF2', letter: 'S' },
  ];

  const RADIUS = 33;
  const CIRC = 2 * Math.PI * RADIUS;
  const lanesEl = document.getElementById('lanes');
  const state = {};

  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      osc.start(); osc.stop(ctx.currentTime + 0.6);
    } catch (e) {}
  }

  function effectiveCooldown(hasteIdx) {
    const haste = HASTE_STEPS[hasteIdx].value;
    return BASE_COOLDOWN / (1 + haste / 100) + TOLERANCE;
  }

  const DANGER = { r: 255, g: 59, b: 59 }; // urgency red for the final stretch

  function hexToRgb(hex) {
    const n = parseInt(hex.slice(1), 16);
    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
  }

  function rgbToHex(r, g, b) {
    return '#' + [r, g, b].map((v) => Math.round(v).toString(16).padStart(2, '0')).join('');
  }

  // Ring stays the lane's own color until the last 30% of the timer,
  // then eases toward a warning red as time runs out.
  function ringColorForProgress(laneHex, pct) {
    const THRESHOLD = 0.3;
    if (pct > THRESHOLD) return laneHex;
    const base = hexToRgb(laneHex);
    const t = 1 - pct / THRESHOLD;
    return rgbToHex(
      base.r + (DANGER.r - base.r) * t,
      base.g + (DANGER.g - base.g) * t,
      base.b + (DANGER.b - base.b) * t
    );
  }

  LANES.forEach((lane) => {
    state[lane.id] = { remaining: 0, duration: BASE_COOLDOWN, active: false, handle: null, hasteIdx: 0 };

    const row = document.createElement('div');
    row.className = 'lane-row';
    row.innerHTML = `
      <div class="ring-wrap" data-lane="${lane.id}">
        <svg class="ring-svg" width="78" height="78">
          <circle cx="39" cy="39" r="${RADIUS}" fill="none" stroke="var(--line)" stroke-width="7" />
          <circle class="ring-progress" cx="39" cy="39" r="${RADIUS}" fill="none" stroke="${lane.color}" stroke-width="7"
            stroke-linecap="round" stroke-dasharray="${CIRC}" stroke-dashoffset="0" />
        </svg>
        <div class="letter-icon" style="color:${lane.color};">${lane.letter}</div>
        <div class="timer-text">0:00</div>
      </div>
      <div class="lane-info" data-lane="${lane.id}">
        <p class="lane-name">${lane.name}</p>
        <p class="lane-status">Ready</p>
      </div>
      <button class="haste-badge" data-lane="${lane.id}">—</button>
    `;
    lanesEl.appendChild(row);

    row.querySelectorAll('.ring-wrap, .lane-info').forEach((el) =>
      el.addEventListener('click', () => toggleLane(lane, row))
    );
    row.querySelector('.haste-badge').addEventListener('click', (e) => {
      e.stopPropagation();
      cycleHaste(lane, row);
    });
  });

  function cycleHaste(lane, row) {
    const s = state[lane.id];
    s.hasteIdx = (s.hasteIdx + 1) % HASTE_STEPS.length;
    const step = HASTE_STEPS[s.hasteIdx];
    const badge = row.querySelector('.haste-badge');
    badge.textContent = step.label;
    badge.classList.toggle('active', step.value > 0);
  }

  function toggleLane(lane, row) {
    const s = state[lane.id];
    const ring = row.querySelector('.ring-progress');
    const status = row.querySelector('.lane-status');
    const icon = row.querySelector('.letter-icon');
    const timerText = row.querySelector('.timer-text');

    if (s.active) {
      clearInterval(s.handle);
      s.active = false;
      s.remaining = 0;
      ring.setAttribute('stroke-dashoffset', 0);
      ring.setAttribute('stroke', lane.color);
      status.textContent = 'Ready';
      status.style.color = 'var(--muted)';
      icon.style.display = 'flex';
      timerText.style.display = 'none';
      return;
    }

    s.duration = effectiveCooldown(s.hasteIdx);
    s.remaining = s.duration;
    s.active = true;
    icon.style.display = 'none';
    timerText.style.display = 'flex';
    status.textContent = 'Cooling down';

    s.handle = setInterval(() => {
      s.remaining -= 0.1;
      if (s.remaining <= 0) {
        s.remaining = 0;
        clearInterval(s.handle);
        s.active = false;
        ring.setAttribute('stroke-dashoffset', 0);
        ring.setAttribute('stroke', lane.color);
        icon.style.display = 'flex';
        timerText.style.display = 'none';
        status.textContent = 'Ready!';
        status.style.color = lane.color;
        playBeep();
        if (navigator.vibrate) navigator.vibrate([250, 100, 250]);
        setTimeout(() => {
          status.textContent = 'Ready';
          status.style.color = 'var(--muted)';
        }, 2500);
        return;
      }
      const pct = s.remaining / s.duration;
      ring.setAttribute('stroke-dashoffset', CIRC * (1 - pct));
      ring.setAttribute('stroke', ringColorForProgress(lane.color, pct));
      const mm = Math.floor(s.remaining / 60);
      const ss = Math.floor(s.remaining % 60);
      timerText.textContent = mm + ':' + String(ss).padStart(2, '0');
    }, 100);
  }

  // --- PWA install ---
  let deferredPrompt = null;
  const installBar = document.getElementById('installBar');
  const installBtn = document.getElementById('installBtn');
  const installClose = document.getElementById('installClose');
  const installText = document.getElementById('installText');

  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  const isIOS = /iphone|ipad|ipod/i.test(window.navigator.userAgent);

  if (!isStandalone) {
    if (isIOS) {
      installText.textContent = "To install: tap Share, then 'Add to Home Screen'";
      installBtn.style.display = 'none';
      installBar.classList.add('show');
    } else {
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBar.classList.add('show');
      });
    }
  }

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBar.classList.remove('show');
  });

  installClose.addEventListener('click', () => installBar.classList.remove('show'));

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
